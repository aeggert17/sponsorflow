{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4">
            <h3 class="text-center mb-4">Login to SponsorFlow</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" name="email" class="form-control" required placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="Password">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Login / Sign Up</button>
                </div>
                <p class="mt-3 text-muted text-center" style="font-size: 0.8rem;">
                    Note: For this MVP, if the email doesn't exist, an account will be created.
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
